<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: #1f2937;
        text-align: center;
        background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
    }

    .container {
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
        padding: 36px;
        background-color: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    h1 {
        margin: 0 0 10px;
        color: #000000;
        font-size: 32px;
    }

    h2 {
        margin: 0 0 16px;
        color: #374151;
        font-size: 21px;
    }

    .subtitle {
        margin: 0 0 28px;
        color: #6b7280;
        font-size: 14px;
        line-height: 1.6;
    }

    .section {
        margin-bottom: 24px;
        padding: 24px;
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
    }

    .section:last-child {
        margin-bottom: 0;
    }

    form {
        margin: 0;
    }

    input {
        width: 100%;
        margin: 7px 0;
        padding: 13px 15px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background-color: #ffffff;
        color: #111827;
        font-size: 15px;
        outline: none;
        transition:
            border-color 0.2s ease,
            box-shadow 0.2s ease;
    }

    input::placeholder {
        color: #9ca3af;
    }

    input:focus {
        border-color: #9c9c9c;
        box-shadow: 0 0 0 3px rgba(92, 92, 92, 0.15);
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 13px 20px;
        border: none;
        border-radius: 10px;
        background-color: #88b4ff;
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition:
            background-color 0.2s ease,
            transform 0.2s ease,
            box-shadow 0.2s ease;
    }

    button:hover {
        background-color: #88b4ff;
        box-shadow: 0 8px 18px rgba(79, 70, 229, 0.2);
        transform: translateY(-1px);
    }

    button:active {
        transform: translateY(0);
    }

    #register-section button {
        background-color: #4f8ef4;
    }

    #register-section button:hover {
        background-color: #4f8ef4;
        box-shadow: 0 8px 18px rgba(15, 118, 110, 0.2);
    }

    #delete-section {
        background-color: #fef2f2;
        border-color: #fecaca;
    }

    #delete-section button {
        background-color: #dc2626;
    }

    #delete-section button:hover {
        background-color: #b91c1c;
        box-shadow: 0 8px 18px rgba(220, 38, 38, 0.2);
    }

    #logged-in-screen h1 {
        overflow-wrap: anywhere;
    }

    @media (max-width: 600px) {
        body {
            align-items: flex-start;
            padding: 20px 12px;
        }

        .container {
            padding: 24px 18px;
            border-radius: 14px;
        }

        .section {
            padding: 18px;
        }

        h1 {
            font-size: 27px;
        }
    }
</style>
</head>
<body>
    <div class="container" id="login-screen">
    <h1>User Management</h1>
    <p class="subtitle">
        Sign in to manage your account or create a new account.
    </p>
        <div class="section" id="login-section">
            <h2>Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" aria-label="Login email" required>
                <input type="password" id="login-password" placeholder="Password" aria-label="Login password" required>
                <button type="button" onclick="loginUser()">Login</button>
            </form>
        </div>
        <div class="section" id="register-section">
            <h2>Register</h2>
            <form id="register-form">
                <input type="email" id="register-email" placeholder="Email" aria-label="Registration email" required>
                <input type="password" id="register-password" placeholder="Password" aria-label="Registration password" required>
                <input type="text" id="register-username" placeholder="Username" aria-label="Username" required>
                <button type="button" onclick="registerUser()">Register</button>
            </form>
        </div>
    </div>

    <div class="container" id="logged-in-screen" style="display: none;">
        <h1><span id="username"></span></h1>
        <p class="subtitle">
            Manage your password or delete your account below.
        </p>
        <div class="section" id="update-password-section">
            <h2>Update Password</h2>
            <form id="update-password-form">
                <input type="password" id="update-password" placeholder="New Password" aria-label="New password" required>
                <button type="button" onclick="updatePassword()">Update Password</button>
            </form>
        </div>

        <div class="section" id="delete-section">
            <h2>Delete Account</h2>
            <button type="button" onclick="deleteUser()">Delete Account</button>
        </div>
    </div>

    <script>
        let userEmail = null;

        function loginUser() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            fetch('/api/user/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(error => { throw new Error(error.detail); });
                }
                return response.json();
            })
            .then(data => {
                userEmail = email; // 로그인 성공 시 이메일 저장
                document.getElementById('username').textContent = `Hello, ${data.data.username}!`; // 사용자 이름 표시
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('logged-in-screen').style.display = 'block';
            })
            .catch(error => alert(`Login failed: ${error.message}`));
        }

        function registerUser() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const username = document.getElementById('register-username').value;

            fetch('/api/user/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password, username })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(error => { throw new Error(error.detail); });
                }
                return response.json();
            })
            .then(() => alert(`Registration successful! Welcome, ${username}.`)) // 성공 메시지에 사용자 이름 표시
            .catch(error => alert(`Registration failed: ${error.message}`));
        }

        function updatePassword() {
            const newPassword = document.getElementById('update-password').value;

            fetch('/api/user/update-password', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: userEmail, new_password: newPassword })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(error => { throw new Error(error.detail); });
                }
                return response.json();
            })
            .then(() => alert(`Password successfully updated!`)) // 성공 메시지
            .catch(error => alert(`Password update failed: ${error.message}`));
        }

        function deleteUser() {
            if (!userEmail) {
                alert("No user is logged in.");
                return;
            }

            fetch('/api/user/delete', {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: userEmail }) // 저장된 이메일 전송
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(error => { throw new Error(error.detail); });
                }
                return response.json();
            })
            .then(() => {
                alert(`User deleted successfully!`);
                document.getElementById('logged-in-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'block';
                userEmail = null; // 이메일 초기화
            })
            .catch(error => alert(`Account deletion failed: ${error.message}`));
        }
    </script>
</body>
</html>
